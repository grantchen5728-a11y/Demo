<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Demo — Student Form and Table</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    /* keep a minimal amount of custom styling */
    fieldset { border: 1px solid #dee2e6; padding: 1rem; }
    legend { font-weight: 600; }
    #saved-student { margin-top: 0.5rem; font-style: italic; }
  </style>
</head>
<body>

<div class="container my-4">
  <h1 class="mb-4">Student Information</h1>

  <div class="row">
    <div class="col-lg-6">
      <form id="student-form" aria-labelledby="student-form-heading" novalidate>
        <fieldset>
          <legend id="student-form-heading">Enter student details</legend>

          <div class="mb-3">
            <label for="student-name" class="form-label">Student name</label>
            <input type="text" class="form-control" id="student-name" name="student_name" required />
          </div>

          <div class="mb-3">
            <label for="student-id" class="form-label">Student ID</label>
            <input type="text" class="form-control" id="student-id" name="student_id" inputmode="numeric" pattern="\d*" required />
          </div>

          <div class="mb-3">
            <label for="student-birthday" class="form-label">Birthday</label>
            <input type="date" class="form-control" id="student-birthday" name="student_birthday" required />
          </div>

          <button type="submit" class="btn btn-primary">Save</button>
        </fieldset>
      </form>

      <div id="saved-student" class="text-muted" aria-live="polite"></div>
    </div>

    <div class="col-lg-6">
      <h2 class="h5">A basic HTML table</h2>
      <table class="table table-bordered w-100">
        <thead>
          <tr>
            <th>Company</th>
            <th>Contact</th>
            <th>Country</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td>Alfreds Futterkiste</td>
            <td>Maria Anders</td>
            <td>Germany</td>
          </tr>
          <tr>
            <td>Centro comercial Moctezuma</td>
            <td>Francisco Chang</td>
            <td>Mexico</td>
          </tr>
        </tbody>
      </table>

      <p class="small text-muted">To understand the example better, we have added borders to the table.</p>
    </div>
  </div>
</div>

<!-- Bootstrap JS Bundle (includes Popper) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
  // When the form is submitted, show the saved student info in an alert and update the visible status.
  (function () {
    const form = document.getElementById('student-form');
    const out = document.getElementById('saved-student');

    form.addEventListener('submit', function (e) {
      e.preventDefault();

      const name = document.getElementById('student-name').value.trim();
      const id = document.getElementById('student-id').value.trim();
      const birthday = document.getElementById('student-birthday').value;

      if (!name || !id || !birthday) {
        const msg = 'Please fill in all fields.';
        out.textContent = msg;
        alert(msg);
        return;
      }

      // Format date (YYYY-MM-DD) into a more readable form if available
      let birthdayText = birthday;
      try {
        const d = new Date(birthday);
        if (!isNaN(d)) {
          birthdayText = d.toLocaleDateString();
        }
      } catch (err) {
        // leave birthdayText as-is
      }

      const message = `Saved: ${name} (ID: ${id}), Birthday: ${birthdayText}`;

      // Show the result in an alert as requested
      alert(message);

      // Also update the on-page status for accessibility
      out.textContent = message;

      form.reset();
      document.getElementById('student-name').focus();
    });
  })();
</script>

</body>
</html>
